<div class="product-card">
  <a [href]="product.link" target="_blank" class="product-link">
    <img [src]="product.image" [alt]="product.name" class="product-image">
    <h3 class="product-title">{{ product.name }}</h3>
  </a>
  
  <p class="product-description">{{ product.description }}</p>
  
  <div class="product-rating">
    @for (star of getStars(product.rating); track $index) {
      <span class="star">{{ star }}</span>
    }
    <span class="rating-value">({{ product.rating }})</span>
  </div>
  
  <div class="product-price">{{ product.price | number }} ₸</div>
  
  <div class="share-buttons">
    <button (click)="shareOnWhatsApp()" class="share-btn whatsapp">
      WhatsApp
    </button>
    <button (click)="shareOnTelegram()" class="share-btn telegram">
      Telegram
    </button>
  </div>
</div>
