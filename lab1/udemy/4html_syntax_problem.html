<!-- Common Validation Issues: -->

<!-- 1. Multiple main elements -->
<main>...</main>
<main>...</main>  <!-- ERROR: Only one main allowed -->

<!-- 2. Block elements inside inline elements -->
<span>
    <div>Content</div>  <!-- ERROR: div inside span -->
</span>

<!-- 3. Deprecated attributes -->
<font size="3">Text</font>  <!-- DEPRECATED -->
<p align="center">Text</p>  <!-- DEPRECATED -->

<!-- 4. Missing quotes -->
<a href=https://example.com>Link</a>  <!-- RISKY -->
<a href="https://example.com">Link</a> <!-- CORRECT -->
